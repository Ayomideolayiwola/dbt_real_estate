version: 2

models:
  - name: base_properties
    description: "Base model for property listings data"
    columns:
      - name: property_id
        description: "Unique identifier for the property"
        data_tests:
          - not_null
          - unique
      - name: property_type_id
        description: "Foreign key to the property type"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('base_property_types')
                field: property_type_id
      - name: city_id
        description: "Foreign key to the city where the property is located"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('base_cities')
                field: city_id
      - name: agent_id
        description: "Foreign key to the agent responsible for the property"
        data_tests:
          - relationships:
              arguments:
                to: ref('base_agents')
                field: agent_id
      - name: address
        description: "Full address of the property"
      - name: postal_code
        description: "Postal code for the property location"
      - name: floor_number
        description: "Floor number of the property (if applicable)"
      - name: total_floors
        description: "Total number of floors in the building (if applicable)"
      - name: size_sqm
        description: "Size of the property in square meters"
      - name: num_rooms
        description: "Total number of rooms in the property"
      - name: num_bedrooms
        description: "Number of bedrooms in the property"
      - name: num_bathrooms
        description: "Number of bathrooms in the property"
      - name: has_parking
        description: "Indicates if the property has parking available (true/false)"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [ 0, 1 ]
      - name: has_garden
        description: "Indicates if the property has a garden (true/false)"    
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [ 0, 1 ]
      - name: has_balcony
        description: "Indicates if the property has a balcony (true/false)"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [ 0, 1 ]
      - name: amenities
        description: "List of amenities available with the property (e.g., pool, gym)"
      - name: condition_status
        description: "Condition status of the property (e.g., new, good, needs renovation)"
      - name: build_year
        description: "Year the property was built"
      - name: energy_class
        description: "Energy efficiency class of the property (e.g., A, B, C)"
      - name: listing_price
        description: "Listed price of the property"
      - name: is_available
        description: "Indicates if the property is currently available for sale/rent (true/false)"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [ 1 ]
      - name: listed_at
        description: "Date when the property was listed"
      - name: latitude
        description: "Latitude coordinate of the property location"
      - name: longitude
        description: "Longitude coordinate of the property location"