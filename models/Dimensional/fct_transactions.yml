version: 2

models:
  - name: fct_transactions
    description: "Preparation table for transactions. Cleaned and standardized real estate transaction data."
    columns:
      - name: transaction_id
        description: "Unique identifier for the transaction"
        data_tests:
          - unique
          - not_null
      - name: transaction_ref
        description: "Reference code for the transaction, if available"
      - name: property_id
        description: "Foreign key to the property involved in the transaction"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_properties')
                field: property_id
      - name: client_id
        description: "Foreign key to the stg clients"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_clients')
                field: client_id
      - name: agent_id
        description: "Foreign key to the agent involved in the transaction"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_agents')
                field: agent_id
      - name: payment_id
        description: "Foreign key to the payment details associated with the transaction"
        data_tests:
          - relationships:
              arguments:
                to: ref('prep_payment_details')
                field: payment_id
      - name: transaction_type
        description: "Type of transaction (e.g., sale, rental)"
        data_tests:
          - not_null
      - name: transaction_date
        description: "Date when the transaction occurred"
        data_tests:
          - not_null
      - name: agreed_price
        description: "Agreed price for the transaction"
        data_tests:
          - not_null
      - name: listing_price
        description: "Original listing price of the property"
        data_tests:
          - not_null
      - name: discount_amount
        description: "Discount amount applied to the transaction, if any"
        data_tests:
          - not_null
      - name: commission_rate
        description: "Commission rate applied to the transaction, if any"
        data_tests:
          - not_null
      - name: commission_amount
        description: "Commission amount calculated for the transaction, if any"
        data_tests:
          - not_null
      - name: status
        description: "Current status of the transaction (e.g., pending, completed, cancelled)"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [ 'Completed', 'Cancelled', 'Pending', 'Under Contract' ]
      - name: contract_start
        description: "Start date of the contract"
      - name: contract_end
        description: "End date of the contract"
      - name: notes
        description: "Additional notes or comments about the transaction"
      - name: created_at
        description: "Timestamp when the transaction record was created"
        

