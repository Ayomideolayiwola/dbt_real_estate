version: 2

models:
  - name: prep_cities
    description: "Preparation model for city reference data"
    columns:
      - name: city_id
        description: "Unique identifier for the city"
        tests:
          - not_null
          - unique
      - name: region_id
        description: "Foreign key to the region this city belongs to"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('prep_regions')
                field: region_id
      - name: city_name
        description: "Name of the city"
        tests:
          - not_null
      - name: population
        description: "Population of the city"
        data_tests:
          - not_null
      - name: is_major_city
        description: "Indicates whether the city is considered a major city (true/false)"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [ 0, 1 ]

