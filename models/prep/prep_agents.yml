version: 2

models:
  - name: prep_agents
    description: "Preparation model for real estate agent data"
    columns:
      - name: agent_id
        description: "Unique identifier for the agent"
        data_tests:
          - not_null
          - unique
      - name: agency_id
        description: "Foreign key to the agency the agent works for"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('prep_agencies')
                field: agency_id
      - name: full_name
        description: " name of the agent"
      - name: email
        description: "Email address of the agent"
      - name: phone
        description: "Phone number of the agent"
      - name: hire_date
        description: "Date when the agent was hired"
      - name: specialization
        description: "Agent's area of specialization (e.g., residential, commercial)"
      - name: years_experience
        description: "Number of years the agent has been in the industry"
