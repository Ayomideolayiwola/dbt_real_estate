version: 2

models:
  - name: prep_payment_details
    description: "Preparation model for payment details from the real estate system"
    columns:
      - name: payment_id
        description: "Unique identifier for the payment transaction"
        data_tests:
          - not_null
          - unique
      - name: payment_method
        description: "Method used for payment (e.g., cash, bank transfer, online)"
      - name: bank_name
        description: "Name of the bank used for the payment, if applicable"
      - name: mortgage_rate
        description: "Mortgage interest rate applied to the transaction, if applicable"
      - name: mortgage_term_years
        description: "Duration of the mortgage in years, if applicable"
      - name: down_payment_pct
        description: "Percentage of the total price paid as a down payment, if applicable"

