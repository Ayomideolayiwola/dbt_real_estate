version: 2

models:
  - name: prep_accm_completion_update
    description: "Preparation model for accommodation completion update data"
    columns:
      - name: txn_id
        description: "Unique identifier for the completion record"
        data_tests:
          - not_null
          - unique
      
      - name: accm_txn_complete_time
        description: "Date time stamp for account completion"
        data_tests:
          - not_null