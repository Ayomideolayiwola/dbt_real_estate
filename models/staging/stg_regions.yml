version: 2

models:
  - name: stg_regions
    description: "Staging model for region reference data"
    columns:
      - name: region_id
        description: "Unique identifier for the region"
        data_tests:
          - not_null
          - unique
      - name: region_code
        description: "Code or abbreviation for the region"
        data_tests:
          - not_null
      - name: region_name
        description: "Name of the region (e.g., Northeast, Midwest)"
        data_tests:
          - not_null
      - name: price_multiplier
        description: "Price multiplier for properties in this region compared to the national average"
        data_tests:
          - not_null
      - name: capital_city
        description: "Capital city of the region"
        data_tests:
          - not_null
      - name: population
        description: "Population of the region"
        data_tests:
          - not_null
      - name: area_sqkm
        description: "Area of the region in square kilometers"
        data_tests:
          - not_null


