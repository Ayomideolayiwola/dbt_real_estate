version: 2

models:
  - name: stg_agents
    description: "Staging model for real estate agent data"
    columns:
      - name: agent_id
        description: "Unique identifier for the agent"
        data_tests:
          - not_null
          - unique
      - name: agency_id
        description: "Foreign key to the agency the agent works for"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_agencies')
                field: agency_id
      - name: first_name
        description: "First name of the agent"
      - name: last_name
        description: "Last name of the agent"
      - name: license_number
        description: "Agent's professional license number"
      - name: email
        description: "Email address of the agent"
      - name: phone
        description: "Phone number of the agent"
      - name: hire_date
        description: "Date when the agent was hired"
      - name: specialization
        description: "Agent's area of specialization (e.g., residential, commercial)"
      - name: years_experience
        description: "Number of years the agent has been in the industry"
      - name: is_active
        description: "Indicates whether the agent is currently active (true/false)"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [ 1 ]
