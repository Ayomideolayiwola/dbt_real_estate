version: 2

models:
  - name: stg_accm_completion_update
    description: "Staging model for accommodation completion update data"
    columns:
      - name: txn_id
        description: "Unique identifier for the completion record"
        tests:
          - not_null
          - unique
      
      - name: accm_txn_complete_time
        description: "Date time stamp for account completion"
        tests:
          - not_null